<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png?v=2" />
    <link rel="manifest" href="/manifest.json?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lunæ" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#101010" />
    <meta name="description" content="Lunæ - Chia sẻ ảnh & video cute với bạn bè, reaction và bình luận realtime." />
    <title>Lunæ</title>
  </head>
  <body>
    <script>
      if (
        'serviceWorker' in navigator &&
        ['localhost', '127.0.0.1'].includes(window.location.hostname) &&
        !sessionStorage.getItem('supasnap_sw_dev_reset')
      ) {
        sessionStorage.setItem('supasnap_sw_dev_reset', '1');
        navigator.serviceWorker.getRegistrations()
          .then((registrations) => Promise.all(registrations.map((reg) => reg.unregister())))
          .then(() => caches.keys())
          .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
          .then(() => {
            if (navigator.serviceWorker.controller) {
              window.location.reload();
            }
          })
          .catch((err) => console.log('SW dev reset failed:', err));
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          if (import.meta.env.PROD) {
            navigator.serviceWorker.register('/sw.js')
              .then((reg) => console.log('SW registered:', reg.scope))
              .catch((err) => console.log('SW registration failed:', err));
            return;
          }

          navigator.serviceWorker.getRegistrations()
            .then((registrations) => Promise.all(registrations.map((reg) => reg.unregister())))
            .then(() => caches.keys())
            .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
            .catch((err) => console.log('SW cleanup failed:', err));
        });
      }
    </script>
  </body>
</html>
