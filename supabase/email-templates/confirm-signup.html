<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Xác nhận SupaSnap</title>
</head>
<body style="margin:0;padding:0;background:#fdf2f8;font-family:'Segoe UI',Tahoma,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fdf2f8;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="100%" style="max-width:480px;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 12px 40px rgba(255,77,141,0.15);">
          <tr>
            <td style="background:linear-gradient(135deg,#ff4d8d,#c084fc,#6366f1);padding:28px;text-align:center;">
              <h1 style="margin:0;color:#fff;font-size:26px;font-weight:800;">SupaSnap 📸</h1>
              <p style="margin:8px 0 0;color:rgba(255,255,255,0.9);font-size:13px;">Chia sẻ khoảnh khắc cute cùng bạn bè</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 28px;text-align:center;">
              <h2 style="margin:0 0 12px;color:#1e1b4b;font-size:20px;">Xác nhận email của bạn ✨</h2>
              <p style="margin:0 0 24px;color:#64748b;font-size:14px;line-height:1.6;">
                Cảm ơn bạn đã đăng ký! Bấm nút bên dưới để kích hoạt tài khoản và bắt đầu đăng snap.
              </p>
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;padding:14px 32px;background:linear-gradient(90deg,#ff4d8d,#f43f5e);color:#fff;text-decoration:none;font-weight:700;font-size:15px;border-radius:16px;">
                Xác nhận tài khoản
              </a>
              <p style="margin:24px 0 0;color:#94a3b8;font-size:11px;line-height:1.5;">
                Nếu bạn không đăng ký SupaSnap, hãy bỏ qua email này.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
